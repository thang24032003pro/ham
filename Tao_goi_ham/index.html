<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thực hành Hàm Confirm</title>
</head>
<body>

    <script>
        function processConfirm(answer) {
            return answer 
                ? "Excellent. We'll play a nice game of chess." 
                : "Maybe later then.";
        }

        let confirmAnswer = confirm("Shall we play a game?");
        let message = processConfirm(confirmAnswer);
        
        alert(message);
    </script>

</body>
</html>
